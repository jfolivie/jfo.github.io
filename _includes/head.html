{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<script>
  // Set language as early as possible to avoid EN/FR flash.
  (function () {
    var lang = 'en';
    try {
      var stored = localStorage.getItem('lang');
      if (stored === 'en' || stored === 'fr') {
        lang = stored;
      }
    } catch (e) {
      // localStorage may be blocked in some browsers/privacy modes.
    }
    document.documentElement.setAttribute('data-lang', lang);
  })();
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
