<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
  (function () {
    function toggleLanguage(event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      var root = document.documentElement;
      var current = root.getAttribute('data-lang') || 'en';
      var next = current === 'en' ? 'fr' : 'en';
      root.setAttribute('data-lang', next);

      try {
        localStorage.setItem('lang', next);
      } catch (e) {
        /* Ignore storage errors. */
      }
    }

    window.toggleSiteLanguage = toggleLanguage;

    document.addEventListener('DOMContentLoaded', function () {
      var link = document.getElementById('lang-toggle-link');
      if (link) {
        link.addEventListener('click', toggleLanguage);
      }
    });
  })();
</script>
