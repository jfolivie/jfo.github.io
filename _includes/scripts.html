<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('lang-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var current = document.documentElement.getAttribute('data-lang') || 'en';
      var next = current === 'en' ? 'fr' : 'en';
      document.documentElement.setAttribute('data-lang', next);
      try {
        localStorage.setItem('lang', next);
      } catch (e) {
        // Ignore storage errors while keeping in-session language switch.
      }
    });
  });
</script>
